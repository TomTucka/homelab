---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: homer
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: homer
      version: 8.1.7
      sourceRef:
        kind: HelmRepository
        name: djjudas21
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: ingress-nginx
      namespace: networking
  values:
    image:
      repository: b4bz/homer
      tag: v23.05.1
      pullPolicy: IfNotPresent
    service:
      main:
        ports:
          http:
            port: 8080
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        hosts:
          - host: &host "dashboard.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    persistence:
      config:
        enabled: true
        existingClaim: homer-config
        mountPath: /www/assets
    configmap:
      config:
        enabled: true
        data:
          config.yml: |
            ---
            # Homepage configuration
            # See https://fontawesome.com/icons for icons options

            title: "Dashboard"
            subtitle: "Welcome to The Coach House"
            logo: "logo.png"
            # icon: "fas fa-skull-crossbones" # Optional icon

            header: true
            footer: '<p>Created with <span class="has-text-danger">❤️</span> with <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a> // Fork me on <a href="https://github.com/bastienwirtz/homer"><i class="fab fa-github-alt"></i></a></p>' # set false if you want to hide it.

            # Optional theme customization
            theme: default
            colors:
              light:
                highlight-primary: "#3367d6"
                highlight-secondary: "#4285f4"
                highlight-hover: "#5a95f5"
                background: "#f5f5f5"
                card-background: "#ffffff"
                text: "#363636"
                text-header: "#ffffff"
                text-title: "#303030"
                text-subtitle: "#424242"
                card-shadow: rgba(0, 0, 0, 0.1)
                link-hover: "#363636"
              dark:
                highlight-primary: "#3367d6"
                highlight-secondary: "#4285f4"
                highlight-hover: "#5a95f5"
                background: "#131313"
                card-background: "#2b2b2b"
                text: "#eaeaea"
                text-header: "#ffffff"
                text-title: "#fafafa"
                text-subtitle: "#f5f5f5"
                card-shadow: rgba(0, 0, 0, 0.4)
                link-hover: "#ffdd57"

            # Optional message
            # message:
            #   #url: https://b4bz.io
            #   style: "is-dark" # See https://bulma.io/documentation/components/message/#colors for styling options.
            #   title: "Service List"
            #   icon: "fa fa-grin"
            #   content: "This is a list of all services available in our home. <br /> Find more information on <a href='https://github.com/jgilfoil/k8s-gitops'>github.com/jgilfoil/k8s-gitops</a>"

            # Optional navbar
            # links: [] # Allows for navbar (dark mode, layout, and search) without any links
            links:
              - name: "Contribute"
                icon: "fab fa-github"
                url: "https://github.com/bastienwirtz/homer"
                target: "_blank" # optional html a tag target attribute
              - name: "Wiki"
                icon: "fas fa-book"
                url: "https://www.wikipedia.org/"

            # Services
            # First level array represent a group.
            # Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
            services:
              - name: "Media"
                icon: "fas fa-photo-video"
                items:
                  - name: "Plex"
                    #icon: fas fa-compact-disc
                    logo: "https://raw.githubusercontent.com/NX211/homer-icons/7e25ff430c87accb39b8b39ddb2e9617f46d6fb1/png/plex.png"
                    subtitle: "Movies, TV, and Audio Books"
                    tag: "App"
                    url: "https://plex.apostoli.pw"
                    target: "_plex"
              - name: "Services"
                icon: "fas fa-tools"
                items:
                  - name: "Unifi"
                    logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/router.png"
                    subtitle: "Unifi Control Plane"
                    tag: "Tools"
                    url: "http://unifi.${SECRET_DOMAIN}"
                    target: "_router"
                  - name: "Grafana"
                    logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/grafana.png"
                    subtitle: "Analytics and Visisualations"
                    tag: "Tools"
                    url: "https://grafana.${SECRET_DOMAIN}"
                    target: "_grafana"
                  # - name: "Rook"
                  #   logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/rook.png"
                  #   subtitle: "Rook-Ceph Storage Cluster Dashboard"
                  #   tag: "Tools"
                  #   url: "https://rook.apostoli.pw"
                  #   target: "_rook"
                  # - name: "NAS"
                  #   logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/synology.png"
                  #   subtitle: "Synology NAS Dashboard"
                  #   tag: "Tools"
                  #   url: "https://wanshitong.apostoli.pw:5001"
                  #   target: "_nas"
                  # - name: "Traefik"
                  #   logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/traefik.png"
                  #   subtitle: "K8s Ingress and Traffic Router"
                  #   tag: "Tools"
                  #   url: "https://traefik.apostoli.pw"
                  #   target: "_traefik"
                  # - name: "Cluster-Backup"
                  #   logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/minio.png"
                  #   subtitle: "Local NAS Minio"
                  #   tag: "Tools"
                  #   url: "http://wanshitong.apostoli.pw:9001/login"
                  #   target: "_minio"
                  # - name: "Logs"
                  #   logo: "https://raw.githubusercontent.com/NX211/homer-icons/master/png/minio.png"
                  #   subtitle: "Minio Loki Logs Storage Bucket"
