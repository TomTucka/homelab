---
# Project information
site_name: tomtucka | Home Lab
site_description: A mono repository for my home infrastructure and Kubernetes cluster which tries to adhere to Infrastructure as Code (IaC) and GitOps practices
site_author: Tom Withers
site_url: https://tomtucka.github.io/home-ops/

# Repository
repo_name: tomtucka/homelab
repo_url: https://github.com/tomtucka/homelab
edit_uri: "edit/main/docs/"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github-alt
  language: en
  features:
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

docs_dir: ./docs

# Customization
extra_css:
  - _static/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tomtucka
    - icon: fontawesome/brands/discord
      link: https://discord.gg/k8s-at-home
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/tomtucka

# Plugins
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - macros:
      include_dir: docs/_snippets

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true

# Navigation structure
nav:
  - Introduction: index.md
  - Installation:
      - Installing Kubernetes: installation/installing-kubernetes.md
  # - Networking:
  #     - General: networking/general.md
  #     - DNS: networking/dns.md
  # - Storage:
  #     - Rook PVC Backup: storage/rook-pvc-backup.md
  #     - Rook PVC Restore: storage/rook-pvc-restore.md