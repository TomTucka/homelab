---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: homer
  namespace: home
spec:
  interval: 5m
  releaseName: homer
  chart:
    spec:
      chart: homer
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: b4bz/homer
      tag: 21.09.2
    env:
      TZ: "Europe/London"

    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        hosts:
          - host: "homer.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "homer.${SECRET_DOMAIN}"
            secretName: "homer-tls"
    persistence:
      data:
        enabled: true
        existingClaim: homer-config
    podAnnotations:
      configmap.reloader.stakater.com/reload: "homer-settings"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    configmap:
      config:
        # -- Store homer configuration as a ConfigMap
        enabled: true
        # -- Homer configuration. See [image documentation](https://github.com/bastienwirtz/homer/blob/main/docs/configuration.md) for more information.
        # @default -- See values.yaml
        data:
          config.yml: |
            title: "Harrier Network"
            columns: "3"
            header: false
            footer: false
            theme: default
            colors:
              light:
                highlight-primary: "#3367d6"
                highlight-secondary: "#4285f4"
                highlight-hover: "#5a95f5"
                background: "#f5f5f5"
                card-background: "#ffffff"
                text: "#363636"
                text-header: "#ffffff"
                text-title: "#303030"
                text-subtitle: "#424242"
                card-shadow: rgba(0, 0, 0, 0.1)
                link-hover: "#363636"
              dark:
                highlight-primary: "#2E3440"
                highlight-secondary: "#4C566A"
                highlight-hover: "#81A1C1"
                background: "#3B4252"
                card-background: "#2E3440"
                text: "#D8DEE9"
                text-header: "#D8DEE9"
                text-title: "#81A1C1"
                text-subtitle: "#81A1C1"
                card-shadow: rgba(0, 0, 0, 0.4)
                link-hover: "#BF616A"
            links:
              - name: "GitHub"
                icon: "fab fa-github-square"
                url: "https://github.com/"
              - name: "/r/homelab"
                icon: "fab fa-reddit-square"
                url: "https://reddit.com/r/homelab"
              - name: "/r/selfhosted"
                icon: "fab fa-reddit-square"
                url: "https://reddit.com/r/selfhosted"
            services:
              - name: "Services"
                icon: "fas fa-server"
                items:
                  - name: "Traefik"
                    icon: "fas fa-network-wired"
                    url: "https://traefik.harrier.network/"
              - name: "Applications"
                icon: "fas fa-shapes"
                items:
                  - name: "Plex"
                    icon: "fas fa-tv"
                    url: "https://app.plex.tv/desktop/#!/"
              - name: "Monitoring"
                icon: "fas fa-chart-area"
                items:
                  - name: "Grafana"
                    icon: "fas fa-chart-bar"
                    url: "https://grafana.harrier.network/"
                  - name: "Promethues"
                    icon: "fas fa-chart-bar"
                    url: "https://promethues.harrier.network/"
                  - name: "Alert Manager"
                    icon: "fas fa-chart-bar"
                    url: "https://alerts.harrier.network/"
